<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaphire Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #FFFFFF, #1b4332);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 py-6">

    <div class="w-full max-w-sm bg-[#0b1f16] p-6 rounded-xl shadow-lg border border-green-700">

        <h2 class="text-xl font-semibold text-center text-green-400 mb-5">
            Snaphire Signup
        </h2>

        {% if messages %}
            <div class="mb-4 space-y-1">
                {% for message in messages %}
                    <p class="text-sm {% if message.tags == 'error' %}text-red-400{% else %}text-green-300{% endif %}">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-3" id="signup-form">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-sm text-gray-300 mb-1">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                    minlength="3"
                    maxlength="150"
                    pattern="[a-zA-Z0-9_]+"
                    title="3–150 characters; letters, numbers, and underscores only"
                    autocomplete="username"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
            </div>

            <div>
                <label for="email" class="block text-sm text-gray-300 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter email"
                    required
                    maxlength="254"
                    autocomplete="email"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
            </div>

            <div>
                <label for="password" class="block text-sm text-gray-300 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                    minlength="8"
                    maxlength="128"
                    autocomplete="new-password"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm text-gray-300 mb-1">Confirm Password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required
                    minlength="8"
                    maxlength="128"
                    autocomplete="new-password"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
                <p id="password-match-error" class="hidden text-xs text-red-400 mt-1">Passwords do not match.</p>
            </div>

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-medium transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-gray-400 mt-4 text-sm">
            Already have an account?
            <a href="{% url 'login' %}" class="text-green-400 hover:text-green-300">Login</a>
        </p>

    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function (event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorEl = document.getElementById('password-match-error');

            if (password !== confirmPassword) {
                event.preventDefault();
                errorEl.classList.remove('hidden');
                document.getElementById('confirm_password').focus();
                return;
            }

            errorEl.classList.add('hidden');
        });

        document.getElementById('confirm_password').addEventListener('input', function () {
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('password-match-error');

            if (this.value && password !== this.value) {
                errorEl.classList.remove('hidden');
            } else {
                errorEl.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
