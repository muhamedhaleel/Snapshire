<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaphire Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, rgb(255, 255, 255), #1b4332);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen px-4 py-6">

    <div class="w-full max-w-sm bg-[#0b1f16] p-6 rounded-xl shadow-lg border border-green-700">

        <h2 class="text-xl font-semibold text-center text-green-400 mb-1">
            Snaphire Admin
        </h2>
        <p class="text-center text-xs text-gray-500 mb-5">Admin login only</p>

        {% if messages %}
            <div class="mb-4 space-y-1">
                {% for message in messages %}
                    <p class="text-sm {% if 'error' in message.tags %}text-red-400{% elif 'info' in message.tags %}text-blue-300{% else %}text-green-300{% endif %}">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'admin_login' %}" class="space-y-3" id="login-form">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-sm text-gray-300 mb-1">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter superuser username"
                    required
                    minlength="3"
                    maxlength="150"
                    autocomplete="username"
                    value="{{ username|default:'' }}"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
            </div>

            <div>
                <label for="password" class="block text-sm text-gray-300 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                    maxlength="128"
                    autocomplete="current-password"
                    class="w-full px-3 py-2 text-sm rounded bg-[#102a20] text-white border border-green-700 focus:outline-none focus:ring-1 focus:ring-green-500">
            </div>

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-medium transition">
                Log In
            </button>
        </form>

        <p class="text-center text-gray-500 mt-4 text-xs leading-relaxed">
            Use your <span class="text-gray-400">Admin</span> account only.<br>
            only Admins
        </p>

    </div>

</body>
</html>
